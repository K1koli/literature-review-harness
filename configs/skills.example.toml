# Copy to configs/skills.toml to enable local external skills.
# configs/skills.toml is ignored by git so each collaborator can tune it locally.
#
# The built-in skills under ./skills/research-framing, ./skills/survey-writing,
# and ./skills/citation-grounding are always discoverable. The entries below
# are optional third-party skill paths. They are disabled by default because
# third-party skill repos are intentionally not vendored in this repository.

[[skills]]
name = "agent-literature-review"
path = "skills/agent-research-skills/skills/literature-review"
roles = ["research_framing", "survey_writing", "citation_grounding"]
enabled = false
allow_scripts = false
max_chars = 4000

