<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Literature Review Harness Demo</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Literature Review Harness</p>
          <h1>Evidence-grounded survey demo</h1>
        </div>
        <div class="topbar-actions">
          <a class="ghost-link disabled" id="downloadMd" href="#" download>Markdown</a>
          <a class="ghost-link disabled" id="downloadPdf" href="#" download>PDF</a>
          <a class="ghost-link disabled" id="downloadEvidence" href="#" download>Evidence</a>
        </div>
      </header>

      <main class="workspace">
        <aside class="control-pane">
          <form id="reviewForm" class="run-form">
            <label for="topicInput">Topic</label>
            <textarea id="topicInput" name="topic" rows="4">World Models（世界模型）</textarea>
            <div class="button-row">
              <button class="primary-btn" id="runButton" type="submit">Generate</button>
              <button class="secondary-btn" id="sampleButton" type="button">Sample</button>
            </div>
          </form>

          <section class="status-panel" aria-live="polite">
            <div class="status-row">
              <span class="status-dot idle" id="statusDot"></span>
              <span id="statusText">Idle</span>
            </div>
            <div class="metric-grid">
              <div>
                <span id="paperCount">0</span>
                <small>Papers</small>
              </div>
              <div>
                <span id="evidenceCount">0</span>
                <small>Evidence</small>
              </div>
              <div>
                <span id="citedCount">0</span>
                <small>Cited ids</small>
              </div>
              <div>
                <span id="citationStatus">-</span>
                <small>Check</small>
              </div>
            </div>
          </section>

          <section class="evidence-focus" id="evidenceFocus">
            <p class="panel-label">Evidence focus</p>
            <p class="muted">Select an evidence id in the article.</p>
          </section>
        </aside>

        <section class="output-pane">
          <details class="trace-panel" id="tracePanel" open>
            <summary>
              <span>Harness trace</span>
              <small id="traceSummary">Waiting</small>
            </summary>
            <ol class="trace-log" id="traceLog"></ol>
          </details>

          <section class="visual-summary" id="visualSummary" hidden>
            <div class="pipeline" id="pipeline"></div>
            <div class="visual-grid">
              <div class="viz-box">
                <div class="viz-title">Evidence timeline</div>
                <div class="timeline-bars" id="timelineBars"></div>
              </div>
              <div class="viz-box">
                <div class="viz-title">Source mix</div>
                <div class="source-bars" id="sourceBars"></div>
              </div>
            </div>
          </section>

          <section class="article-shell">
            <div class="article-tabs" role="tablist">
              <button class="tab-btn active" data-tab="markdown" type="button">Markdown</button>
              <button class="tab-btn" data-tab="pdf" type="button">PDF</button>
            </div>
            <article class="article markdown-body" id="markdownView">
              <div class="empty-state">
                <strong>No review loaded</strong>
                <span>Start a run or open the sample output.</span>
              </div>
            </article>
            <div class="pdf-view" id="pdfView" hidden>
              <object id="pdfObject" type="application/pdf"></object>
            </div>
          </section>
        </section>
      </main>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
